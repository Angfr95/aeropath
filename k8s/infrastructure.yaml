# ─── Redis ────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: aeropath
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: aeropath
spec:
  ports:
    - port: 6379
  selector:
    app: redis

---
# ─── NATS ────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: aeropath
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
        - name: nats
          image: nats:2-alpine
          args: ["-js", "-m", "8222"]
          ports:
            - containerPort: 4222
              name: client
            - containerPort: 8222
              name: monitor
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: aeropath
spec:
  ports:
    - port: 4222
      name: client
    - port: 8222
      name: monitor
  selector:
    app: nats

---
# ─── ClickHouse ───────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
  namespace: aeropath
spec:
  serviceName: clickhouse
  replicas: 1
  selector:
    matchLabels:
      app: clickhouse
  template:
    metadata:
      labels:
        app: clickhouse
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24-alpine
          ports:
            - containerPort: 9000
              name: native
            - containerPort: 8123
              name: http
          env:
            - name: CLICKHOUSE_DB
              value: aeroforge
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: aeropath
spec:
  ports:
    - port: 9000
      name: native
    - port: 8123
      name: http
  selector:
    app: clickhouse

---
# ─── Jaeger ───────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: aeropath
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:latest
          ports:
            - containerPort: 16686
              name: ui
            - containerPort: 14268
              name: traces
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: aeropath
spec:
  ports:
    - port: 16686
      name: ui
    - port: 14268
      name: traces
  selector:
    app: jaeger

---
# ─── Prometheus ───────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: aeropath
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: aeropath
spec:
  ports:
    - port: 9090
  selector:
    app: prometheus
