services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aeropath
      POSTGRES_USER: aeropath
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aeropath"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-js", "-m", "8222"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    ports:
      - "9000:9000"
      - "8123:8123"
    environment:
      CLICKHOUSE_DB: aeroforge
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ============================================================
  #  📊 MONITORING — Prometheus + Jaeger + Grafana
  # ============================================================

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: aeropath-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./dashboards/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./dashboards/prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      - api-gateway
      - worker

  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: aeropath-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"   # UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  grafana:
    image: grafana/grafana:11.1.0
    container_name: aeropath-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: ""
    depends_on:
      - prometheus

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: aeropath-pg-exporter
    restart: unless-stopped
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://aeropath:secret@postgres:5432/aeropath?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: aeropath-redis-exporter
    restart: unless-stopped
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: "redis:6379"
    depends_on:
      redis:
        condition: service_healthy

  nats-exporter:
    image: natsio/prometheus-nats-exporter:0.15.0
    container_name: aeropath-nats-exporter
    restart: unless-stopped
    ports:
      - "7777:7777"
    command:
      - "-connz"
      - "-routez"
      - "-subz"
      - "-varz"
      - "-channelz"
      - "-serverz"
      - "http://nats:8222"
    depends_on:
      nats:
        condition: service_healthy

volumes:
  postgres_data:
  clickhouse_data:
  prometheus_data:
  grafana_data:


