apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aeropath
  namespace: aeropath
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "4m"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.aeropath.app
      secretName: aeropath-tls
  rules:
    - host: api.aeropath.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80
