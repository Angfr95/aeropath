services:
  nginx:
    image: nginx:alpine
    container_name: aeropath-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./web:/usr/share/nginx/html:ro
    depends_on:
      - api-gateway
    networks:
      - aeropath-net

  api-gateway:
    image: ghcr.io/angfr95/aeropath-api:main
    container_name: aeropath-api
    restart: unless-stopped
    expose:
      - "8080"
      - "9090"
      - "50051"
    env_file: .env
    environment:
      DATABASE_URL: "postgres://aeropath:${POSTGRES_PASSWORD}@postgres:5432/aeropath?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      NATS_URL: "nats://nats:4222"
      CLICKHOUSE_HOST: "clickhouse:9000"
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD}"
      JAEGER_ENDPOINT: "http://jaeger:14268/api/traces"
      JWT_SECRET: "${JWT_SECRET}"
      PORT: "${PORT}"
      GIN_MODE: release
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - aeropath-net

  worker:
    image: ghcr.io/angfr95/aeropath-worker:main
    container_name: aeropath-worker
    restart: unless-stopped
    expose:
      - "9090"
    env_file: .env
    environment:
      DATABASE_URL: "postgres://aeropath:${POSTGRES_PASSWORD}@postgres:5432/aeropath?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      NATS_URL: "nats://nats:4222"
      CLICKHOUSE_HOST: "clickhouse:9000"
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - aeropath-net

  postgres:
    image: postgres:16-alpine
    container_name: aeropath-postgres
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      POSTGRES_DB: aeropath
      POSTGRES_USER: aeropath
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aeropath"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - aeropath-net

  redis:
    image: redis:7-alpine
    container_name: aeropath-redis
    restart: unless-stopped
    expose:
      - "6379"
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - aeropath-net

  nats:
    image: nats:2-alpine
    container_name: aeropath-nats
    restart: unless-stopped
    expose:
      - "4222"
      - "8222"
    command: ["-js", "-m", "8222"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - aeropath-net

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: aeropath-clickhouse
    restart: unless-stopped
    expose:
      - "9000"
      - "8123"
    environment:
      CLICKHOUSE_DB: aeroforge
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD}"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --password '${CLICKHOUSE_PASSWORD}' --query 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - aeropath-net

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: aeropath-prometheus
    restart: unless-stopped
    expose:
      - "9090"
    volumes:
      - ./dashboards/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./dashboards/prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - aeropath-net

  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: aeropath-jaeger
    restart: unless-stopped
    expose:
      - "16686"
      - "4317"
      - "4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - aeropath-net

  grafana:
    image: grafana/grafana:11.1.0
    container_name: aeropath-grafana
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_USER}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD}"
    depends_on:
      - prometheus
    networks:
      - aeropath-net

volumes:
  postgres_data:
  redis_data:
  clickhouse_data:
  prometheus_data:
  grafana_data:

networks:
  aeropath-net:
    driver: bridge
