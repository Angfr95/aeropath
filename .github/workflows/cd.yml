name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

env:
  GO_VERSION: "1.26"
  REGISTRY: ghcr.io

jobs:
  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Docker meta (api-gateway)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Docker meta (worker)
        id: meta-worker
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.DEEP_TOKEN }}

      - name: Build & Push api-gateway
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.worker
          push: true
          tags: ${{ steps.meta-worker.outputs.tags }}
          labels: ${{ steps.meta-worker.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [docker]
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/aeropath

            # Clean reset: discard all local changes (ssl/ is NOT in repo, preserved on disk)
            git fetch origin main
            git reset --hard origin/main

            # Remove untracked files EXCEPT ssl/ directory and .env
            git clean -fd --exclude=ssl/ --exclude=.env

            # Build frontend React et copier dans web/ pour nginx
            cd /opt/aeropath/web/frontend-react
            npm ci --production=false
            npm run build
            cp -r dist/* ../..
            cd /opt/aeropath
            echo "✅ Frontend React built and deployed to web/"

            # Auto-generate self-signed SSL cert if missing
            if [ ! -f ssl/cert.pem ] || [ ! -f ssl/key.pem ]; then
              mkdir -p ssl
              openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
                -keyout ssl/key.pem \
                -out ssl/cert.pem \
                -subj "/C=FR/ST=IDF/L=Paris/O=AeroPath/CN=aeropath.ultizion.com" \
                2>/dev/null
              echo "✅ Self-signed SSL cert generated in ssl/"
            fi

            docker compose pull
            docker compose up -d --remove-orphans
            docker compose exec nginx nginx -s reload || docker compose restart nginx
            docker image prune -f
  
