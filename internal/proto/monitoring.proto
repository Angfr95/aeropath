syntax = "proto3";

package aeroforge.monitoring;

option go_package = "aeropath/internal/proto/monitoring";

service MonitoringService {
  rpc GetHealth(HealthRequest) returns (HealthResponse);
  rpc GetMetrics(MetricsRequest) returns (MetricsResponse);
  rpc StreamServiceStatus(ServiceStatusRequest) returns (stream ServiceStatus);
}

message HealthRequest {}

message HealthResponse {
  string status = 1;
  map<string, ServiceHealth> services = 2;
  int64 uptime_seconds = 3;
  string version = 4;
}

message ServiceHealth {
  string name = 1;
  string status = 2;
  int64 last_heartbeat = 3;
  string error_message = 4;
}

message MetricsRequest {
  repeated string metric_names = 1;
}

message MetricsResponse {
  int64 timestamp = 1;
  map<string, double> gauges = 2;
  map<string, int64> counters = 3;
  map<string, double> histograms = 4;
}

message ServiceStatusRequest {
  repeated string services = 1;
}

message ServiceStatus {
  string service_name = 1;
  string status = 2;
  double cpu_usage = 3;
  double memory_usage_mb = 4;
  int64 request_count = 5;
  double error_rate = 6;
  double avg_latency_ms = 7;
  int64 timestamp = 8;
}
