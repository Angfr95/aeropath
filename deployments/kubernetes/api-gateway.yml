# ============================================================
#  KUBERNETES — API Gateway Deployment
# ============================================================
# DDIA: Container Orchestration, Service Discovery, Scaling
#
# À adapter :
# - Image registry (votre registry Docker)
# - Namespace
# - Ingress configuration
# - Resource limits
# - ConfigMap pour les variables d'env
# - Horizontal Pod Autoscaler
# - PodDisruptionBudget
#
# Voir : deployments/docker/Dockerfile.api
# Voir : deployments/compose/docker-compose.yml
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: aeroforge-api
  namespace: aeroforge
  labels:
    app: aeroforge
    service: api-gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aeroforge
      service: api-gateway
  template:
    metadata:
      labels:
        app: aeroforge
        service: api-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "2112"
    spec:
      containers:
        - name: api-gateway
          image: aeroforge/api-gateway:latest
          ports:
            - containerPort: 8080
            - containerPort: 2112
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: aeroforge-secrets
                  key: database_url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: aeroforge-secrets
                  key: jwt_secret
            - name: NATS_URL
              value: "nats://nats:4222"
            - name: REDIS_URL
              value: "redis://redis:6379"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: aeroforge
spec:
  selector:
    app: aeroforge
    service: api-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: metrics
      port: 2112
      targetPort: 2112
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aeroforge-api-hpa
  namespace: aeroforge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aeroforge-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
