syntax = "proto3";

package aeroforge.learning;

option go_package = "aeropath/internal/proto/learning";

service LearningService {
  rpc GetQuestion(GetQuestionRequest) returns (Question);
  rpc ListQuestions(ListQuestionsRequest) returns (ListQuestionsResponse);
  rpc SubmitAnswer(SubmitAnswerRequest) returns (SubmitAnswerResponse);
  rpc StartExam(StartExamRequest) returns (Exam);
  rpc SubmitExam(SubmitExamRequest) returns (ExamResult);
  rpc StreamQuestions(StreamQuestionsRequest) returns (stream Question);
}

message GetQuestionRequest {
  string question_id = 1;
}

message Question {
  string id = 1;
  string question_fr = 2;
  string question_en = 3;
  repeated string options = 4;
  string answer_key = 5;
  string explanation_fr = 6;
  string explanation_en = 7;
  string license = 8;
  string category = 9;
  string theme = 10;
  string subtopic = 11;
  int32 difficulty = 12;
  string reference = 13;
}

message ListQuestionsRequest {
  string license = 1;
  string category = 2;
  string theme = 3;
  int32 page = 4;
  int32 page_size = 5;
}

message ListQuestionsResponse {
  repeated Question questions = 1;
  int32 total = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message SubmitAnswerRequest {
  string question_id = 1;
  string answer = 2;
  string student_id = 3;
}

message SubmitAnswerResponse {
  bool correct = 1;
  string correct_answer = 2;
  string explanation_fr = 3;
  string explanation_en = 4;
}

message StartExamRequest {
  string license = 1;
  string category = 2;
  int32 question_count = 3;
}

message Exam {
  string exam_id = 1;
  repeated Question questions = 2;
  int32 total_questions = 3;
  int32 duration_minutes = 4;
}

message SubmitExamRequest {
  string exam_id = 1;
  repeated AnswerEntry answers = 2;
}

message AnswerEntry {
  string question_id = 1;
  string answer = 2;
}

message ExamResult {
  string exam_id = 1;
  int32 total = 2;
  int32 correct = 3;
  double score_percent = 4;
  bool passed = 5;
  repeated QuestionResult details = 6;
}

message QuestionResult {
  string question_id = 1;
  string question_fr = 2;
  string question_en = 3;
  string your_answer = 4;
  string correct_answer = 5;
  bool was_correct = 6;
  string explanation_fr = 7;
  string explanation_en = 8;
}

message StreamQuestionsRequest {
  string license = 1;
  string category = 2;
  int32 batch_size = 3;
}
